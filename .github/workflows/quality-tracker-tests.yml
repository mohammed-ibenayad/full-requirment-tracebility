name: Quality Tracker Tests

on:
  repository_dispatch:
    types: [quality-tracker-test-run]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          
      - name: Print test information
        run: |
          echo "Running tests for requirement: ${{ github.event.client_payload.requirementId }}"
          echo "Requirement name: ${{ github.event.client_payload.requirementName }}"
          echo "Test cases: ${{ join(github.event.client_payload.testCases, ', ') }}"
          
      - name: Run tests by test case IDs
        id: run_tests
        run: |
          # Create a file with pytest marker expressions for each test case ID
          echo "import sys" > run_marked_tests.py
          echo "import pytest" >> run_marked_tests.py
          echo "if __name__ == '__main__':" >> run_marked_tests.py
          echo "    test_case_ids = ${{ toJson(github.event.client_payload.testCases) }}" >> run_marked_tests.py
          echo "    # Build marker expressions for each test case ID" >> run_marked_tests.py
          echo "    marker_expr = ' or '.join([f'testcase_id(\"{tc_id}\")' for tc_id in test_case_ids])" >> run_marked_tests.py
          echo "    # Run pytest with the marker expressions and additional arguments" >> run_marked_tests.py
          echo "    sys.exit(pytest.main(['-v', '-m', marker_expr, '--json-report', '--json-report-file=test-results.json']))" >> run_marked_tests.py
          
          # Run the tests with the appropriate markers
          python run_marked_tests.py
          
      - name: Process test results
        if: always()
        run: |
          # Process the test results to make them easier to consume by Quality Tracker
          if [ -f "test-results.json" ]; then
            python -c '
import json
import re

# Read the test results
with open("test-results.json", "r") as f:
    results = json.load(f)

# Extract test case information from test markers
formatted_results = []

# Map to keep track of which test cases were found
test_cases_found = {}
for test_id in ${{ toJson(github.event.client_payload.testCases) }}:
    test_cases_found[test_id] = False

# Process each test result
for test_path, test_data in results.get("tests", {}).items():
    # Extract test case ID from test markers if present
    test_markers = test_data.get("metadata", {}).get("markers", [])
    test_case_id = None
    
    for marker in test_markers:
        if marker.startswith("testcase_id"):
            # Extract the test case ID from the marker (looking for format like "testcase_id('TC-007')")
            match = re.search(r"testcase_id\([\"\'](TC-\d+)[\"\']\)", marker)
            if match:
                test_case_id = match.group(1)
                break
    
    if test_case_id and test_case_id in test_cases_found:
        test_cases_found[test_case_id] = True
        formatted_results.append({
            "id": test_case_id,
            "name": test_path.split("::")[-1],
            "status": "Passed" if test_data.get("outcome") == "passed" else "Failed",
            "duration": test_data.get("duration", 0) * 1000,  # Convert to ms
            "logs": test_data.get("call", {}).get("longrepr", "No logs available")
        })

# Add placeholders for test cases that were not found
for test_id, found in test_cases_found.items():
    if not found:
        formatted_results.append({
            "id": test_id,
            "name": f"Test case {test_id}",
            "status": "Not Run",
            "duration": 0,
            "logs": "Test not found in the repository or did not run"
        })

# Write the formatted results
with open("formatted-results.json", "w") as f:
    json.dump(formatted_results, f, indent=2)
'
          else
            echo "Test results file not found"
            # Create a basic result file for missing results
            echo "[" > formatted-results.json
            first=true
            for test_id in ${{ toJson(github.event.client_payload.testCases) }}; do
              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> formatted-results.json
              fi
              echo "{" >> formatted-results.json
              echo "  \"id\": \"$test_id\"," >> formatted-results.json
              echo "  \"name\": \"Test case $test_id\"," >> formatted-results.json
              echo "  \"status\": \"Not Run\"," >> formatted-results.json
              echo "  \"duration\": 0," >> formatted-results.json
              echo "  \"logs\": \"Test results could not be generated\"" >> formatted-results.json
              echo "}" >> formatted-results.json
            done
            echo "]" >> formatted-results.json
          fi
          
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: |
            test-results.json
            formatted-results.json